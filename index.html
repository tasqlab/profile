    <style>
        :root {
            /* 🎨 Change these to match your vibe */
            --bg-color: #0a0a0a;
            --card-bg: rgba(20, 20, 20, 0.75);
            --text-primary: #ffffff;
            --text-secondary: #a0a0a0;
            --accent: #8a2be2;       /* Purple glow */
            --glow: 0 0 15px rgba(138, 43, 226, 0.4);
            --hover-bg: rgba(138, 43, 226, 0.15);
            --font-main: 'Inter', system-ui, sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            background: var(--bg-color);
            color: var(--text-primary);
            font-family: var(--font-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
        }

        /* Background Media + Overlay */
        .bg-media {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://images.unsplash.com/photo-1534796636912-3b95b3ab5986?auto=format&fit=crop&w=1920&q=80') center/cover no-repeat;
            z-index: -2;
            filter: brightness(0.25) blur(3px);
        }

        .bg-overlay {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, rgba(10,10,10,0.4), rgba(10,10,10,0.95));
            z-index: -1;
        }

        /* Main Card */
        .profile-card {
            background: var(--card-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 2.5rem;
            width: 90%;
            max-width: 420px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.6), var(--glow);
            animation: fadeUp 0.8s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(24px) scale(0.98); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .avatar {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            border: 3px solid var(--accent);
            box-shadow: var(--glow);
            object-fit: cover;
            margin-bottom: 1rem;
            transition: transform 0.3s ease;
        }
        .avatar:hover { transform: scale(1.05) rotate(2deg); }

        .username {
            font-size: 1.9rem;
            font-weight: 700;
            margin-bottom: 0.2rem;
            letter-spacing: -0.5px;
        }

        .tag {
            color: var(--text-secondary);
            font-size: 0.85rem;
            margin-bottom: 1rem;
            font-weight: 500;
        }

        .bio {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.6;
            margin-bottom: 1.6rem;
        }

        .links { display: flex; flex-direction: column; gap: 0.75rem; }

        .link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.6rem;
            padding: 0.85rem 1rem;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 500;
            transition: all 0.25s ease;
        }

        .link:hover {
            background: var(--hover-bg);
            border-color: var(--accent);
            transform: translateY(-2px);
            box-shadow: var(--glow);
        }

        .link svg { width: 18px; height: 18px; fill: currentColor; flex-shrink: 0; }

        .footer {
            margin-top: 1.8rem;
            font-size: 0.7rem;
            color: var(--text-secondary);
            opacity: 0.6;
            letter-spacing: 0.5px;
        }

        /* Mobile Tweaks */
        @media (max-width: 480px) {
            .profile-card { padding: 2rem 1.5rem; }
            .username { font-size: 1.6rem; }
            .link { padding: 0.75rem; }
        }
    </style>
